name: Publish image

# Builds the voicebox container image and pushes it to GitHub Container
# Registry (ghcr.io). The Actions GITHUB_TOKEN has write:packages for this
# repo's own package, so no external credentials are needed.
#
# Tags produced (CPU image):
#   - on a git tag `vX.Y.Z`  -> image `X.Y.Z` (the pinnable release used by GitOps)
#   - on push to `main`      -> image `main` and `main-<shortsha>` (for testing)
#
# Tags produced (CUDA image, STT GPU only; TTS stays CPU):
#   - on a git tag `vX.Y.Z` or workflow_dispatch -> image `X.Y.Z-cuda`
#   - not built on every main push (avoids doubling bake time)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # -> ghcr.io/<owner>/voicebox

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Validate
        run: |
          ruff check .
          ruff format --check src tests clients scripts
          pytest -q -m "not model and not latency"
          bash -n clients/claude-code/speak.sh
          docker compose config -q
          docker compose --profile cuda config -q

  build-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          # latest=false: this repo's GitOps policy pins numeric tags, never :latest.
          flavor: |
            latest=false
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,prefix=sha-,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # amd64 is the k3s node arch. The build downloads STT+TTS models into the
      # image (fetch_models.py), so the first build is a few minutes.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-push-cuda:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive CUDA image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          flavor: |
            latest=false
            suffix=-cuda
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=manual,enable=${{ github.event_name == 'workflow_dispatch' }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push CUDA image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.cuda
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
