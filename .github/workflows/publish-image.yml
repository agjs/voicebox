name: Publish image

# Builds the voicebox container image and pushes it to GitHub Container
# Registry (ghcr.io). The Actions GITHUB_TOKEN has write:packages for this
# repo's own package, so no external credentials are needed.
#
# Tags produced:
#   - on a git tag `vX.Y.Z`  -> image `X.Y.Z` (the pinnable release used by GitOps)
#   - on push to `main`      -> image `main` and `main-<shortsha>` (for testing)

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}   # -> ghcr.io/<owner>/voicebox

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=ref,event=branch
            type=sha,prefix={{branch}}-,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # amd64 is the k3s node arch. The build downloads STT+TTS models into the
      # image (fetch_models.py), so the first build is a few minutes.
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
