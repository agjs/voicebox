name: Test

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint
        run: |
          ruff check .
          ruff format --check src tests clients scripts
      - name: Unit tests
        run: pytest -q -m "not model and not latency"
      - name: Validate scripts and Compose
        run: |
          bash -n clients/claude-code/speak.sh
          docker compose config -q
          docker compose --profile cuda config -q
